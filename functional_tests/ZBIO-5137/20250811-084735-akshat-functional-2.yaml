openapi: 3.0.0
info:
  title: מערכת ניהול כרטיסי אשראי API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /credit-card/balance:
    get:
      summary: שליפת תאריך יעד ויתרה של כרטיס אשראי
      description: שליפת תאריך יעד ויתרה של כרטיס אשראי תקף
      security:
        - bearerAuth: []
      responses:
        '200':
          description: תגובה מוצלחת עם תאריך יעד ויתרה
          content:
            application/json:
              schema:
                type: object
                properties:
                  dueDate:
                    type: string
                    format: date
                  balance:
                    type: number
  /user/call-arrangement:
    post:
      summary: סידור שיחה למשתמש אם היתרה לא שולמה ועברה את תאריך היעד
      description: סידור שיחה למשתמש במידה והיתרה לא שולמה ועברה את תאריך היעד
      security:
        - bearerAuth: []
      responses:
        '201':
          description: סידור השיחה בוצע בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "סידור השיחה בוצע בהצלחה"
  /credit-card/update-balance:
    put:
      summary: עדכון יתרת כרטיס האשראי לאחר תשלום
      description: עדכון יתרת כרטיס האשראי לאחר קבלת תשלום
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentDetails:
                  type: object
                  properties:
                    amount:
                      type: number
                    transactionId:
                      type: string
      responses:
        '200':
          description: יתרת הכרטיס התעדכנה בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "יתרת הכרטיס התעדכנה בהצלחה"
  /payments/process-multiple:
    post:
      summary: בדיקת התנהגות המערכת בעומס בעת עיבוד תשלומים מרובים
      description: עיבוד תשלומים מרובים בעומס גבוה ועדכון יתרות הכרטיסים
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  paymentDetails:
                    type: object
                    properties:
                      amount:
                        type: number
                      transactionId:
                        type: string
      responses:
        '200':
          description: כל התשלומים עובדו ויתרות הכרטיסים מעודכנות
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "כל התשלומים עובדו ויתרות הכרטיסים מעודכנות"
  /payments/process:
    post:
      summary: בדיקת המשכיות המערכת כאשר שער התשלומים נופל
      description: עיבוד תשלום כאשר המערכת למטה
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentDetails:
                  type: object
                  properties:
                    amount:
                      type: number
                    transactionId:
                      type: string
      responses:
        '503':
          description: המערכת למטה ואין אובדן נתונים
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "השירות אינו זמין כרגע, נסה שוב מאוחר יותר"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
