openapi: 3.0.0
info:
  title: מערכת ניהול כרטיסי אשראי API
  description: API לניהול כרטיסי אשראי כולל בדיקות יתרה, תשלום, ושיחות אוטומטיות
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /credit-card/balance/unpaid:
    get:
      summary: אימות יתרת כרטיס שלא שולמה
      description: שליפת יתרת כרטיס אשראי שלא שולמה עבור משתמש מחובר
      security:
        - bearerAuth: []
      responses:
        '200':
          description: יתרה שלא שולמה נשלפה בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  unpaidBalance:
                    type: number
                    example: 150.75
  /credit-card/payment-date:
    get:
      summary: אימות תאריך התשלום
      description: שליפת תאריך התשלום של כרטיס אשראי עבור משתמש מחובר
      security:
        - bearerAuth: []
      responses:
        '200':
          description: תאריך התשלום נשלף בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentDate:
                    type: string
                    format: date
                    example: '2023-10-15'
  /credit-card/auto-call-status:
    get:
      summary: אימות הפעלת שיחה לאחר תאריך התשלום
      description: בדיקת סטטוס שיחה אוטומטית עבור משתמש עם יתרה שלא שולמה
      security:
        - bearerAuth: []
      responses:
        '200':
          description: סטטוס שיחה אוטומטית נשלף בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  autoCallEnabled:
                    type: boolean
                    example: true
  /credit-card/payment:
    post:
      summary: בדיקת תהליך איסוף תשלום בכרטיס
      description: ביצוע תשלום בכרטיס אשראי עבור יתרה שלא שולמה
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cardNumber:
                  type: string
                  example: '1234-5678-9012-3456'
                expirationDate:
                  type: string
                  example: '12/25'
                cvv:
                  type: string
                  example: '123'
      responses:
        '200':
          description: תשלום הצליח והיתרה עודכנה
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentStatus:
                    type: string
                    example: 'success'
                  updatedBalance:
                    type: number
                    example: 0.00
  /credit-card/balance:
    get:
      summary: בדיקת זמן תגובת המערכת בעת שליפת יתרת כרטיס
      description: שליפת יתרת כרטיס אשראי עבור משתמש מחובר
      security:
        - bearerAuth: []
      responses:
        '200':
          description: יתרה נשלפה בהצלחה
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    example: 200.00
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
